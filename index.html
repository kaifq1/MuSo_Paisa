<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f8f3ed">
<title>Paisa - Learn. Save. Grow.</title>
<meta name="description" content="Paisa - the free, no-login financial learning companion for families of the MuSo Financial Literacy Programme. Schemes, learning, budgeting and quizzes in English and Hindi.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Mukta:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f8f3ed; --paper:#fffdf8; --ink:#2c2218; --ink-soft:#6f6354; --ink-faint:#a3978a;
  --green:#1d9e75; --green-soft:#e2f2ea; --yellow:#f6b93b; --yellow-soft:#fdeecd;
  --coral:#e85d4a; --coral-soft:#fbe3de; --blue:#3b6fb6; --blue-soft:#e2ebf7;
  --line:#e7ddd0; --shadow:4px 4px 0 rgba(44,34,24,0.1);
  --head:'Baloo 2',cursive; --body:'Mukta',sans-serif;
  --r:18px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--ink);font-family:var(--body);font-size:16.5px;line-height:1.6;min-height:100vh;overflow-x:hidden;padding-bottom:84px}
h1,h2,h3,h4,.head{font-family:var(--head);line-height:1.2}
button{font-family:inherit;color:inherit;cursor:pointer;background:none;border:none}
input{font-family:inherit}
a{color:inherit}
/* baseline: inline doodles scale to surrounding text; context rules below (.sec-h svg, .sch-ic svg, etc.) override via higher specificity */
svg{width:1.15em;height:1.15em;vertical-align:-0.2em;flex-shrink:0}
:focus-visible{outline:3px solid var(--green);outline-offset:2px;border-radius:6px}
.wrap{max-width:760px;margin:0 auto;padding:0 16px}
@media(min-width:900px){body{padding-bottom:20px}.wrap{max-width:980px}}

/* HEADER */
.top{position:sticky;top:0;z-index:60;background:rgba(248,243,237,0.94);backdrop-filter:blur(8px);border-bottom:2px solid var(--line)}
.top-in{max-width:980px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:10px}
.logo{display:flex;align-items:center;gap:8px;font-family:var(--head);font-weight:800;font-size:1.5rem;letter-spacing:-0.01em}
.logo svg{width:30px;height:30px}
.logo .tm{font-size:0.62rem;font-weight:700;color:var(--green);align-self:flex-start;margin-top:4px}
.top-sp{flex:1}
.lang-tg{display:flex;border:2px solid var(--ink);border-radius:100px;overflow:hidden;background:var(--paper)}
.lang-tg button{padding:5px 12px;font-weight:700;font-size:0.8rem;font-family:var(--head)}
.lang-tg button.on{background:var(--ink);color:var(--cream)}
.user-chip{display:flex;align-items:center;gap:7px;border:2px solid var(--ink);background:var(--paper);border-radius:100px;padding:3px 12px 3px 4px;font-weight:700;font-family:var(--head);font-size:0.85rem;box-shadow:var(--shadow);transition:transform .15s}
.user-chip:active{transform:translate(2px,2px);box-shadow:none}
.user-chip svg{width:30px;height:30px}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:70;background:var(--paper);border-top:2px solid var(--ink);display:flex;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
.bnav button{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:0.62rem;font-weight:700;color:var(--ink-faint);padding:4px 10px;border-radius:12px;font-family:var(--head);min-width:56px}
.bnav button svg{width:24px;height:24px}
.bnav button.on{color:var(--ink);background:var(--yellow-soft)}
@media(min-width:900px){.bnav{position:static;border:none;background:none;justify-content:center;gap:8px;padding:14px 0 0}.bnav button{flex-direction:row;gap:8px;font-size:0.85rem;border:2px solid transparent;padding:8px 18px;border-radius:100px}.bnav button.on{border-color:var(--ink);box-shadow:var(--shadow)}}

/* PAGES */
.page{display:none;padding:18px 0 40px;animation:pop .35s cubic-bezier(0.16,1,0.3,1)}
.page.on{display:block}
@keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.page-title{font-size:clamp(1.6rem,5vw,2.2rem);font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.page-title svg{width:34px;height:34px;flex-shrink:0}
.page-sub{color:var(--ink-soft);margin-bottom:20px;max-width:560px}

/* CARDS */
.card{background:var(--paper);border:2px solid var(--ink);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;position:relative}
.card.flat{box-shadow:none;border-color:var(--line)}
.tap{transition:transform .15s,box-shadow .15s;text-align:left;width:100%}
.tap:active{transform:translate(2px,2px);box-shadow:none}
.badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--head);font-weight:700;font-size:0.68rem;padding:3px 10px;border-radius:100px;border:2px solid var(--ink);text-transform:uppercase;letter-spacing:0.04em}
.badge.new{background:var(--coral);color:#fff;animation:wiggle 2.4s ease-in-out infinite}
@keyframes wiggle{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
.badge.green{background:var(--green);color:#fff}.badge.yellow{background:var(--yellow)}.badge.blue{background:var(--blue);color:#fff}.badge.soft{background:var(--cream)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--head);font-weight:700;font-size:0.95rem;padding:12px 24px;border-radius:100px;border:2px solid var(--ink);box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;min-height:48px}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn.g{background:var(--green);color:#fff}.btn.y{background:var(--yellow)}.btn.c{background:var(--coral);color:#fff}.btn.b{background:var(--blue);color:#fff}.btn.w{background:var(--paper)}
.btn.sm{padding:8px 16px;font-size:0.82rem;min-height:40px}
.btn:disabled{opacity:0.4;box-shadow:var(--shadow);transform:none;cursor:not-allowed}
.grid{display:grid;gap:14px}
@media(min-width:680px){.grid.g2{grid-template-columns:1fr 1fr}}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.fchip{font-family:var(--head);font-weight:700;font-size:0.8rem;border:2px solid var(--ink);background:var(--paper);border-radius:100px;padding:7px 16px;min-height:40px}
.fchip.on{background:var(--ink);color:var(--cream)}

/* HOME */
.hello{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.hello svg{width:52px;height:52px}
.hello h1{font-size:clamp(1.5rem,5.5vw,2rem);font-weight:800}
.hello p{color:var(--ink-soft);font-size:0.9rem;margin-top:-4px}
.streak-dots{display:flex;gap:8px;margin:10px 0 6px}
.sdot{width:30px;height:30px;border-radius:50%;border:2px solid var(--ink);display:grid;place-items:center;font-size:0.62rem;font-weight:700;font-family:var(--head);background:var(--paper);color:var(--ink-faint)}
.sdot.hit{background:var(--yellow);color:var(--ink)}
.sdot.today{box-shadow:0 0 0 3px var(--yellow-soft)}
.feature-card{border-radius:var(--r);border:2px solid var(--ink);box-shadow:var(--shadow);padding:18px;position:relative;overflow:hidden}
.feature-card .doodle-bg{position:absolute;right:-14px;bottom:-18px;width:110px;height:110px;opacity:0.16;transform:rotate(-8deg);pointer-events:none}
.feature-card .doodle-bg svg{width:100%;height:100%}
.lb-row{display:flex;align-items:center;gap:10px;padding:9px 6px;border-bottom:2px dashed var(--line)}
.lb-row:last-child{border-bottom:none}
.lb-row .rank{font-family:var(--head);font-weight:800;width:28px;text-align:center;color:var(--ink-soft)}
.lb-row svg{width:32px;height:32px}
.lb-row .nm{font-weight:700;flex:1}
.lb-row .pts{font-family:var(--head);font-weight:800;color:var(--green)}
.lb-row.me{background:var(--green-soft);border-radius:12px;border:2px solid var(--green)}
.feed-item{display:flex;align-items:center;gap:12px;padding:12px 6px;border-bottom:2px dashed var(--line)}
.feed-item:last-child{border-bottom:none}
.feed-item svg{width:34px;height:34px;flex-shrink:0}
.feed-item .ft{font-weight:700;line-height:1.35}
.feed-item .fs{font-size:0.78rem;color:var(--ink-soft)}
.sec-h{display:flex;align-items:center;gap:8px;font-family:var(--head);font-weight:800;font-size:1.15rem;margin:26px 0 12px}
.sec-h svg{width:24px;height:24px}

/* SCHEME / ARTICLE CARDS */
.sch-card{display:flex;gap:14px;align-items:flex-start}
.sch-ic{width:54px;height:54px;border-radius:14px;border:2px solid var(--ink);display:grid;place-items:center;flex-shrink:0}
.sch-ic svg{width:32px;height:32px}
.sch-t{font-family:var(--head);font-weight:800;font-size:1.05rem;line-height:1.25;margin-bottom:2px}
.sch-d{font-size:0.85rem;color:var(--ink-soft);line-height:1.5}
.sch-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}

/* OVERLAY (detail reader + quiz) */
.ovl{position:fixed;inset:0;z-index:90;background:var(--cream);display:none;flex-direction:column;overflow-y:auto;overscroll-behavior:contain}
.ovl.on{display:flex;animation:up .3s cubic-bezier(0.16,1,0.3,1)}
@keyframes up{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
.ovl-head{position:sticky;top:0;background:rgba(248,243,237,0.95);backdrop-filter:blur(8px);border-bottom:2px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:5}
.ovl-head .ot{font-family:var(--head);font-weight:800;font-size:1rem;flex:1;line-height:1.25}
.ovl-body{max-width:680px;margin:0 auto;width:100%;padding:22px 16px 60px}
.ovl-body h2{font-size:1.5rem;font-weight:800;margin-bottom:6px}
.ovl-body h3{font-size:1.05rem;font-weight:800;margin:22px 0 8px;display:flex;align-items:center;gap:8px}
.ovl-body p{margin-bottom:12px;color:#3d3328}
.ovl-body ul,.ovl-body ol{margin:0 0 14px 22px;display:flex;flex-direction:column;gap:8px;color:#3d3328}
.fact-box{background:var(--yellow-soft);border:2px solid var(--yellow);border-radius:14px;padding:14px 16px;margin:18px 0;font-size:0.92rem}
.fact-box b{font-family:var(--head)}
.step-list{counter-reset:st;list-style:none;margin-left:0!important}
.step-list li{position:relative;padding-left:42px;counter-increment:st}
.step-list li::before{content:counter(st);position:absolute;left:0;top:0;width:30px;height:30px;border-radius:50%;border:2px solid var(--ink);background:var(--yellow);font-family:var(--head);font-weight:800;display:grid;place-items:center;font-size:0.85rem}
.doc-pills{display:flex;gap:8px;flex-wrap:wrap}
.doc-pills span{border:2px solid var(--line);background:var(--paper);border-radius:100px;padding:6px 14px;font-size:0.82rem;font-weight:600}

/* BUDGET */
.calc-in{display:flex;align-items:center;gap:10px;border:2px solid var(--ink);border-radius:14px;background:var(--paper);padding:6px 14px;margin:10px 0 18px}
.calc-in .rs{font-family:var(--head);font-weight:800;font-size:1.3rem;color:var(--green)}
.calc-in input{flex:1;border:none;outline:none;background:none;font-size:1.25rem;font-weight:700;font-family:var(--head);min-width:0;padding:8px 0}
.split-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.split-row .sl{width:96px;font-weight:700;font-size:0.88rem}
.split-row input[type=range]{flex:1;accent-color:var(--green);height:32px}
.split-row .pv{width:46px;text-align:right;font-family:var(--head);font-weight:800}
.split-out{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
@media(max-width:480px){.split-out{grid-template-columns:1fr}}
.so-box{border:2px solid var(--ink);border-radius:14px;padding:12px;text-align:center}
.so-box .sa{font-family:var(--head);font-weight:800;font-size:1.15rem}
.so-box .sk{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em}
.warn{background:var(--coral-soft);border:2px solid var(--coral);border-radius:12px;padding:10px 14px;font-size:0.85rem;margin-top:12px;display:none}
.pgw{height:18px;border:2px solid var(--ink);border-radius:100px;background:var(--paper);overflow:hidden;margin:10px 0 6px}
.pgf{height:100%;background:var(--green);border-radius:100px;transition:width .6s cubic-bezier(0.16,1,0.3,1)}

/* QUIZ */
.q-opt{display:block;width:100%;text-align:left;border:2px solid var(--ink);background:var(--paper);border-radius:14px;padding:14px 16px;font-weight:600;font-size:0.95rem;margin-bottom:10px;box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s}
.q-opt:active{transform:translate(2px,2px);box-shadow:none}
.q-opt.right{background:var(--green-soft);border-color:var(--green)}
.q-opt.wrongpick{background:var(--coral-soft);border-color:var(--coral)}
.q-opt:disabled{cursor:default}
.q-progress{display:flex;gap:6px;margin-bottom:18px}
.q-pip{flex:1;height:7px;border-radius:4px;background:var(--line)}
.q-pip.done{background:var(--green)}.q-pip.now{background:var(--yellow)}
.flip-card{perspective:900px;margin-bottom:16px;cursor:pointer}
.flip-in{position:relative;width:100%;min-height:190px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(0.16,1,0.3,1)}
.flip-card.flipped .flip-in{transform:rotateY(180deg)}
.flip-f,.flip-b{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:2px solid var(--ink);border-radius:var(--r);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:22px;gap:8px}
.flip-f{background:var(--blue-soft)}
.flip-b{background:var(--paper);transform:rotateY(180deg)}
.flip-f .fq{font-family:var(--head);font-weight:800;font-size:1.2rem}
.flip-hint{font-size:0.72rem;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.08em}
.tot-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.tot-row .q-opt{margin:0;text-align:center;font-family:var(--head);font-weight:800;font-size:1.05rem;padding:22px 12px}
.score-big{font-family:var(--head);font-size:4rem;font-weight:800;color:var(--green);line-height:1;text-align:center}
.q-fb{border-radius:12px;padding:12px 16px;font-size:0.9rem;margin:4px 0 14px;display:none}
.q-fb.ok{display:block;background:var(--green-soft);border:2px solid var(--green)}
.q-fb.no{display:block;background:var(--coral-soft);border:2px solid var(--coral)}

/* MODAL (onboarding/profile) */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(44,34,24,0.5);display:none;place-items:center;padding:16px;overflow-y:auto}
.modal-bg.on{display:grid}
.modal{background:var(--cream);border:2px solid var(--ink);border-radius:22px;box-shadow:6px 6px 0 rgba(44,34,24,0.25);max-width:440px;width:100%;padding:26px 22px;animation:up .3s cubic-bezier(0.16,1,0.3,1)}
.modal h2{font-size:1.45rem;font-weight:800;margin-bottom:4px}
.modal .ms{color:var(--ink-soft);font-size:0.9rem;margin-bottom:18px}
.name-in{width:100%;border:2px solid var(--ink);border-radius:14px;background:var(--paper);padding:13px 16px;font-size:1.05rem;font-weight:700;font-family:var(--head);outline:none;margin-bottom:18px}
.av-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.av-cell{border:2px solid var(--line);border-radius:16px;background:var(--paper);padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:0.6rem;font-weight:700;color:var(--ink-soft)}
.av-cell svg{width:44px;height:44px}
.av-cell.on{border-color:var(--green);background:var(--green-soft);box-shadow:var(--shadow)}
.lang-big{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px}
.lang-big button{border:2px solid var(--ink);border-radius:16px;background:var(--paper);padding:18px;font-family:var(--head);font-weight:800;font-size:1.15rem;box-shadow:var(--shadow)}
.lang-big button:active{transform:translate(2px,2px);box-shadow:none}

/* doodle scatter */
.scatter{position:absolute;pointer-events:none;opacity:0.5}
/* confetti */
#cfx{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden}
.cf{position:absolute;top:-12px;width:9px;height:9px;border-radius:2px;animation:cfall 2.6s linear forwards}
@keyframes cfall{to{transform:translateY(105vh) rotate(660deg);opacity:0.3}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
.foot-note{text-align:center;color:var(--ink-faint);font-size:0.78rem;margin-top:34px;line-height:1.7}
</style>
</head>
<body>
<div id="cfx" aria-hidden="true"></div>

<header class="top">
  <div class="top-in">
    <div class="logo" id="logoHome"><span id="logoCoin"></span>Paisa<span class="tm">✦</span></div>
    <div class="top-sp"></div>
    <div class="lang-tg" role="group" aria-label="Language">
      <button id="langEn">EN</button><button id="langHi">हिं</button>
    </div>
    <button class="user-chip" id="userChip" aria-label="Profile"></button>
  </div>
</header>

<main class="wrap">
  <section class="page" id="page-home"></section>
  <section class="page" id="page-schemes"></section>
  <section class="page" id="page-learn"></section>
  <section class="page" id="page-budget"></section>
  <section class="page" id="page-quiz"></section>
</main>

<nav class="bnav" id="bnav" aria-label="Main"></nav>

<div class="ovl" id="ovl">
  <div class="ovl-head"><button class="btn w sm" id="ovlBack">←</button><div class="ot" id="ovlTitle"></div></div>
  <div class="ovl-body" id="ovlBody"></div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>

<script>
'use strict';
/* ───────── helpers & state ───────── */
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
const LSKEY='paisa_v1';
const today=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const FORTNIGHT=Math.max(0,Math.floor((Date.now()-new Date('2026-01-05').getTime())/(15*86400000)));
const inr=n=>'₹'+Math.round(n).toLocaleString('en-IN');
let S=null;
function load(){
  try{S=JSON.parse(localStorage.getItem(LSKEY));}catch(e){S=null;}
  if(!S)S={name:'',avatar:0,lang:'en',points:0,visits:[],quizzes:{}};
  const t=today();
  if(!S.visits.includes(t))S.visits.push(t);
  S.visits=S.visits.slice(-30);
  save();
}
function save(){localStorage.setItem(LSKEY,JSON.stringify(S));}
function streakCount(){
  let n=0;const d=new Date();
  for(;;){
    const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(S.visits.includes(k)){n++;d.setDate(d.getDate()-1);}else break;
  }
  return n;
}
const L=k=>(T[S.lang][k]!==undefined?T[S.lang][k]:T.en[k]||k);
const P=o=>o[S.lang]||o.en;

/* ───────── UI strings ───────── */
const T={
en:{
  navHome:'Home',navSchemes:'Schemes',navLearn:'Learn',navBudget:'Budget',navQuiz:'Quizzes',
  hi1:'Hi',hi2:'good to see you!',streak:'Your visit streak',streakDay:'day',streakDays:'days',
  streakMsg0:'Visit daily to grow your streak!',streakMsg1:'Good start - come back tomorrow!',streakMsg3:'You’re on a roll!',streakMsg5:'Amazing! Real habits are forming ✦',
  fortnight:'This fortnight',quizChallenge:'Quiz Challenge',playNow:'Play now',replay:'Play again',
  schemeOfFn:'Scheme of the Fortnight',seeScheme:'See how to apply',
  leaderboard:'Top learners this week',you:'You',pts:'pts',
  fresh:'Fresh on Paisa',new:'NEW',
  schemesTitle:'Government Schemes',schemesSub:'Real schemes your family may already be eligible for - explained like a friend would, not like a form.',
  all:'All',health:'Health',banking:'Banking',insurance:'Insurance',education:'Education',pension:'Pension',
  who:'Who is this for?',youGet:'What you get',howApply:'How to apply, step by step',docs:'Documents to keep ready',official:'Open official website',officialNote:'Always use the official .gov.in site. No agent or fee is needed for any of these schemes.',
  learnTitle:'Learn',learnSub:'Short reads that make money make sense. Read together - kids and parents.',minRead:'min read',didYouKnow:'Did you know?',tryQuiz:'Try the quiz on this →',
  budgetTitle:'Budget',budgetSub:'Simple tools for real households. Your numbers never leave this phone.',
  calcTitle:'The 50-30-20 Calculator',calcSub:'Enter your monthly take-home income. We’ll split it into Needs, Wants and Savings - you can adjust the split.',
  income:'Monthly income',needs:'Needs',wants:'Wants',savings:'Savings',

{id:'pmsby',cat:'insurance',icon:'shield',col:'var(--blue)',soft:'var(--blue-soft)',link:'https://jansuraksha.gov.in',

{id:'ssy',cat:'education',icon:'girl',col:'var(--coral)',soft:'var(--coral-soft)',link:'https://www.nsiindia.gov.in',
 en:{name:'Sukanya Samriddhi Yojana',tag:'8.2% interest savings for your daughter - the highest safe return in India',

{id:'pmjay',cat:'health',icon:'heart',col:'var(--coral)',soft:'var(--coral-soft)',link:'https://pmjay.gov.in',
 en:{name:'Ayushman Bharat PM-JAY',tag:'₹5 lakh free health cover per family, per year',

{id:'apy',cat:'pension',icon:'jar',col:'var(--blue)',soft:'var(--blue-soft)',link:'https://jansuraksha.gov.in',

{id:'money',icon:'coin',col:'var(--yellow)',soft:'var(--yellow-soft)',mins:3,quiz:null,
 en:{title:'What is money - and why barter failed',sum:'Before money, you traded goats for grain. Here’s why that stopped working.',
  body:`<p>Imagine you grow rice and you need shoes. Without money, you must find a shoemaker who - at that exact moment - wants rice. If she wants milk instead, you're stuck. You'd have to find someone with milk who wants rice, trade for the milk, then carry it to the shoemaker. Exhausting!</p>
<p>This problem has a name: the <b>double coincidence of wants</b>. Barter only works when two people each want exactly what the other has. As villages became towns, this became impossible to manage.</p>
<p>So humans invented something clever: one thing that <b>everyone agrees to accept</b>. Shells, salt, silver coins - and today, paper notes and digital numbers in a bank. Money has no magic in itself; a ₹100 note is just paper. Its power comes from <b>trust</b> - everyone around you agrees it has value, so it does.</p>
<p>That's all money is: a promise the whole society keeps together. Which is also why keeping it safe, growing it and using it wisely is a skill worth learning.</p>`,
  fact:'The word "rupee" comes from the Sanskrit <b>rūpya</b> - meaning a beautifully shaped silver coin. India has been using the name for over 2,000 years!'},
 hi:{title:'पैसा क्या है - और लेन-देन (बार्टर) क्यों फेल हुआ',sum:'पैसे से पहले लोग बकरी देकर अनाज लेते थे। वह तरीका क्यों नहीं चल पाया?',
  body:`<p>सोचिए, आप चावल उगाते हैं और आपको जूते चाहिए। पैसे के बिना आपको ऐसा मोची ढूँढना होगा जिसे - ठीक उसी समय - चावल चाहिए। अगर उसे दूध चाहिए, तो आप फँस गए! पहले दूध वाले को ढूँढिए जो चावल ले, फिर दूध लेकर मोची के पास जाइए। कितनी मेहनत!</p>
<p>इस दिक़्क़त का नाम है - <b>इच्छाओं का दोहरा संयोग</b>। बार्टर तभी चलता है जब दोनों को ठीक वही चाहिए जो दूसरे के पास है। गाँव जब शहर बने, तो यह नामुमकिन हो गया।</p>
<p>तब इंसान ने एक समझदारी की चीज़ बनाई: एक ऐसी चीज़ जिसे <b>सब लोग लेने को तैयार हों</b>। कौड़ियाँ, नमक, चाँदी के सिक्के - और आज काग़ज़ के नोट और बैंक के डिजिटल नंबर। ₹100 का नोट असल में सिर्फ़ काग़ज़ है। उसकी ताक़त <b>भरोसे</b> से आती है - सब मानते हैं कि इसकी क़ीमत है, इसलिए है।</p>
<p>पैसा बस इतना ही है: एक वादा जो पूरा समाज मिलकर निभाता है। इसीलिए उसे सँभालना, बढ़ाना और समझदारी से खर्च करना - सीखने लायक हुनर है।</p>`,
  fact:'"रुपया" शब्द संस्कृत के <b>रूप्य</b> से आया है - यानी सुंदर गढ़ा हुआ चाँदी का सिक्का। भारत यह नाम 2,000 साल से भी ज़्यादा समय से इस्तेमाल कर रहा है!'}},
{id:'bank',icon:'bag',col:'var(--green)',soft:'var(--green-soft)',mins:4,quiz:'banking',
 en:{title:'How a bank actually works',sum:'Your money doesn’t sit in a locker. Here’s where it really goes - and why that’s good.',
  body:`<p>Many people imagine the bank keeps their notes in a big locker with their name on it. The truth is more interesting: the bank <b>lends your money out</b>.</p>
<p>When you deposit ₹1,000, the bank keeps a small part safe and lends the rest to someone else - a farmer buying seeds, a family building a house, a shopkeeper expanding. They pay the bank <b>interest</b> on that loan (say 10%). The bank shares a slice of it with you (say 3–6%) for trusting them with your money. The difference is how the bank earns.</p>
<p>So a bank is really a <b>bridge between savers and borrowers</b> - your savings quietly help someone else's dream, and you earn for it.</p>
<p><b>"But what if everyone asks for their money at once?"</b> Great question - banks must keep a portion in reserve by law, and the RBI (the bank of banks) watches over them. Deposits up to <b>₹5 lakh are insured by DICGC</b>, a government-backed guarantee. That's why money in a bank is far safer than cash at home - which can be lost, stolen, or quietly eaten by rising prices.</p>`,
  fact:'Even money "sleeping" in a savings account earns interest - cash under the mattress earns nothing and loses value to inflation every single year.'},
 hi:{title:'बैंक असल में कैसे काम करता है',sum:'आपका पैसा लॉकर में नहीं रखा रहता। जानिए वह कहाँ जाता है - और यह अच्छी बात क्यों है।',
  body:`<p>बहुत लोग सोचते हैं कि बैंक उनके नोट किसी बड़े लॉकर में उनके नाम से रख देता है। सच ज़्यादा दिलचस्प है: बैंक आपका पैसा <b>आगे उधार दे देता है</b>।</p>
<p>आप ₹1,000 जमा करते हैं, तो बैंक थोड़ा हिस्सा सुरक्षित रखकर बाक़ी किसी और को क़र्ज़ देता है - बीज ख़रीदते किसान को, घर बनाते परिवार को, दुकान बढ़ाते दुकानदार को। वे बैंक को <b>ब्याज</b> देते हैं (मान लीजिए 10%)। उसी में से एक हिस्सा (3–6%) बैंक आपको देता है - आपके भरोसे का इनाम। बीच का फ़र्क़ बैंक की कमाई है।</p>
<p>यानी बैंक असल में <b>बचत करने वालों और ज़रूरतमंदों के बीच का पुल</b> है - आपकी बचत चुपचाप किसी का सपना पूरा करती है, और बदले में आप कमाते हैं।</p>
<p><b>"पर सब एक साथ पैसा माँग लें तो?"</b> बढ़िया सवाल - क़ानूनन बैंक को एक हिस्सा हमेशा रिज़र्व रखना होता है, और RBI (बैंकों का बैंक) उन पर नज़र रखता है। <b>₹5 लाख तक की जमा पर DICGC की सरकारी गारंटी</b> होती है। इसीलिए बैंक का पैसा घर की नक़दी से कहीं ज़्यादा सुरक्षित है - घर की नक़दी खो सकती है, चोरी हो सकती है, और महँगाई उसे चुपचाप खाती रहती है।</p>`,
  fact:'बचत खाते में "सोता" पैसा भी ब्याज कमाता है - गद्दे के नीचे रखी नक़दी कुछ नहीं कमाती और महँगाई से हर साल घटती जाती है।'}},
{id:'compound',icon:'sprout',col:'var(--green)',soft:'var(--green-soft)',mins:3,quiz:'savings',
 en:{title:'Compound interest: how small savings become big',sum:'₹100 a month can become ₹18,000+. The trick is interest earning interest.',
  body:`<p>Simple idea, magical result: when your savings earn interest, and then <b>that interest also starts earning interest</b>, growth speeds up like a cycle rolling downhill. This is compounding.</p>
<p>Watch ₹100 saved every month at 8% yearly interest:</p>
<ul><li>After 1 year: ₹1,245 (you put in ₹1,200)</li><li>After 5 years: <b>₹7,348</b> (you put in ₹6,000)</li><li>After 10 years: <b>₹18,295</b> (you put in just ₹12,000)</li></ul>
<p>You deposited ₹12,000 - compounding quietly added over <b>₹6,000 for free</b>. Stretch it to 20 years and your ₹24,000 becomes about ₹58,900. The money you didn't touch did the heavy lifting.</p>
<p>Two rules fall out of this: <b>start early</b> (time matters more than amount) and <b>don't interrupt it</b> (every withdrawal restarts the slow part of the curve). A small amount saved young beats a big amount saved late - this is the closest thing to magic that maths offers.</p>`,
  fact:'The "Rule of 72": divide 72 by the interest rate to know how many years your money takes to double. At 8%, money doubles every ~9 years!'},
 hi:{title:'चक्रवृद्धि ब्याज: छोटी बचत बड़ी कैसे बनती है',sum:'₹100 महीना भी ₹18,000+ बन सकता है। राज़ है - ब्याज पर ब्याज।',
  body:`<p>बात सीधी है, नतीजा जादुई: जब आपकी बचत ब्याज कमाती है, और फिर <b>वह ब्याज भी ब्याज कमाने लगता है</b>, तो बढ़त ढलान पर लुढ़कते पहिये जैसी तेज़ हो जाती है। इसी को चक्रवृद्धि (कंपाउंडिंग) कहते हैं।</p>
<p>देखिए, हर महीने ₹100 की बचत, 8% सालाना ब्याज पर:</p>
<ul><li>1 साल बाद: ₹1,245 (आपने डाले ₹1,200)</li><li>5 साल बाद: <b>₹7,348</b> (आपने डाले ₹6,000)</li><li>10 साल बाद: <b>₹18,295</b> (आपने डाले सिर्फ़ ₹12,000)</li></ul>
<p>आपने जमा किए ₹12,000 - कंपाउंडिंग ने चुपचाप <b>₹6,000 से ज़्यादा मुफ़्त</b> जोड़ दिए। 20 साल तक चलाइए तो ₹24,000 की जमा लगभग ₹58,900 बन जाती है।</p>
<p>इससे दो नियम निकलते हैं: <b>जल्दी शुरू कीजिए</b> (रकम से ज़्यादा समय मायने रखता है) और <b>बीच में मत रोकिए</b> (हर निकासी बढ़त को फिर धीमे हिस्से पर ले आती है)। कम उम्र की छोटी बचत, देर की बड़ी बचत को हरा देती है - गणित में जादू के सबसे क़रीब यही है।</p>`,
  fact:'"72 का नियम": 72 को ब्याज दर से भाग दीजिए - उतने सालों में पैसा दोगुना। 8% पर पैसा हर ~9 साल में दोगुना होता है!'}},
{id:'efund',icon:'jar',col:'var(--blue)',soft:'var(--blue-soft)',mins:4,quiz:'savings',
 en:{title:'The emergency fund: why it changes everything',sum:'The single biggest difference between a family that survives a shock and one that sinks.',
  body:`<p>Here is a hard truth: for most families, it's not the small expenses that cause disaster. It's the <b>sudden ones</b> - a hospital visit, a job gap, an urgent house repair. Without a cushion, families borrow at terrible interest rates (sometimes 3–5% <i>per month</i> from moneylenders), and one emergency becomes years of debt.</p>
<p>An <b>emergency fund</b> is money kept aside that you never touch except in a true emergency. The target: <b>3 to 6 months of your household expenses</b>. If your family spends ₹12,000/month, aim for ₹36,000–₹72,000 over time.</p>
<p>That sounds huge - so don't start there. Start with <b>one week of expenses</b>. Then one month. Keep it in a separate bank account (a Jan Dhan account works) so it doesn't mix with daily money.</p>
<p>The deepest change isn't financial - it's mental. A family with a cushion makes decisions out of <b>choice</b>, not panic. They can say no to a bad loan, take two weeks to find a better job, pay a hospital deposit without selling jewellery. That calm is what you're really saving for.</p>`,
  fact:'A moneylender charging "just 3% monthly" is actually charging over 42% a year - almost 7 times a bank loan. The emergency fund is your shield against ever needing one.'},
 hi:{title:'इमरजेंसी फ़ंड: यह सब कुछ क्यों बदल देता है',sum:'मुसीबत में टिक जाने वाले और डूब जाने वाले परिवार के बीच का सबसे बड़ा फ़र्क़।',
  body:`<p>एक कड़वा सच: ज़्यादातर परिवारों को छोटे खर्च नहीं डुबोते। डुबोते हैं <b>अचानक आने वाले खर्च</b> - अस्पताल, काम छूट जाना, घर की बड़ी मरम्मत। बिना तैयारी के परिवार भयानक ब्याज पर उधार लेते हैं (साहूकार से कभी-कभी 3–5% <i>हर महीने</i>), और एक मुसीबत सालों का क़र्ज़ बन जाती है।</p>
<p><b>इमरजेंसी फ़ंड</b> वह पैसा है जो अलग रखा जाता है और सच्ची इमरजेंसी के अलावा कभी नहीं छुआ जाता। लक्ष्य: <b>घर के 3 से 6 महीने के खर्च जितना</b>। खर्च ₹12,000/महीना है तो धीरे-धीरे ₹36,000–₹72,000 तक पहुँचिए।</p>
<p>सुनने में बहुत बड़ा लगता है - तो वहाँ से शुरू मत कीजिए। <b>एक हफ़्ते के खर्च</b> से शुरुआत कीजिए। फिर एक महीना। इसे अलग बैंक खाते में रखिए (जन धन खाता बढ़िया है) ताकि रोज़ के पैसे से न मिले।</p>
<p>सबसे गहरा बदलाव पैसों का नहीं, मन का है। जिस परिवार के पास सहारा है, वह फ़ैसले <b>घबराहट से नहीं, सोच-समझकर</b> लेता है - बुरे क़र्ज़ को मना कर पाता है, बेहतर काम ढूँढने के लिए दो हफ़्ते रुक पाता है, गहने बेचे बिना अस्पताल का डिपॉज़िट भर पाता है। असल में आप उसी सुकून के लिए बचा रहे हैं।</p>`,
  fact:'"सिर्फ़ 3% महीना" लेने वाला साहूकार असल में साल का 42% से ज़्यादा ब्याज ले रहा है - बैंक से लगभग 7 गुना। इमरजेंसी फ़ंड वही ढाल है जो आपको कभी वहाँ जाने ही नहीं देता।'}},
{id:'upi',icon:'phone',col:'var(--blue)',soft:'var(--blue-soft)',mins:3,quiz:'digital',
 en:{title:'UPI, NEFT, IMPS, RTGS - in plain language',sum:'Four confusing names, one simple cheat-sheet.',
  body:`<p>All four move money between bank accounts. The difference is speed, size and how you use them:</p>
<ul>
<li><b>UPI</b> - the one you use daily. Scan a QR or use a phone number, money moves <b>instantly, 24×7, free</b>. Perfect for shops, autos, friends. Limit usually ₹1 lakh/day.</li>
<li><b>IMPS</b> - UPI's older sibling. Instant, 24×7, works with account number + IFSC. Useful when someone has no UPI. Small fee possible.</li>
<li><b>NEFT</b> - the patient postman. Sends any amount in batches (within ~2 hours), 24×7. Good for rent or fees when speed doesn't matter. Free in net-banking.</li>
<li><b>RTGS</b> - the heavy-duty truck. For <b>₹2 lakh and above</b>, settles immediately, one transaction at a time. Used for property, business payments.</li>
</ul>
<p>Simple rule for daily life: <b>small & instant → UPI; no-UPI person → IMPS; big & relaxed → NEFT; very big → RTGS.</b></p>
<p>One thing to remember forever: you need your UPI PIN only to <b>send</b> money. Anyone asking you to enter a PIN to <i>receive</i> money is running a scam.</p>`,
  fact:'India’s UPI processes over 13 billion transactions a month - more digital payments than the USA, UK and Europe combined.'},
 hi:{title:'UPI, NEFT, IMPS, RTGS - आसान भाषा में',sum:'चार उलझाने वाले नाम, एक आसान चीट-शीट।',
  body:`<p>चारों का काम एक ही है - एक खाते से दूसरे खाते में पैसा भेजना। फ़र्क़ है रफ़्तार, रकम और इस्तेमाल का:</p>
<ul>
<li><b>UPI</b> - जो आप रोज़ इस्तेमाल करते हैं। QR स्कैन कीजिए या फ़ोन नंबर डालिए, पैसा <b>तुरंत, 24×7, मुफ़्त</b> पहुँचता है। दुकान, ऑटो, दोस्त - सबके लिए। सीमा आमतौर पर ₹1 लाख/दिन।</li>
<li><b>IMPS</b> - UPI का बड़ा भाई। तुरंत, 24×7, खाता नंबर + IFSC से चलता है। जिसके पास UPI नहीं है, उसके लिए। छोटा शुल्क लग सकता है।</li>
<li><b>NEFT</b> - सब्र वाला डाकिया। कोई भी रकम, बैचों में (~2 घंटे के भीतर), 24×7। किराया या फ़ीस जैसे आराम वाले कामों के लिए। नेट-बैंकिंग में मुफ़्त।</li>
<li><b>RTGS</b> - भारी-भरकम ट्रक। <b>₹2 लाख और उससे ऊपर</b> के लिए, तुरंत और अकेले-अकेले निपटता है। ज़मीन-जायदाद, बिज़नेस के लिए।</li>
</ul>
<p>रोज़ की ज़िंदगी का नियम: <b>छोटा और तुरंत → UPI; बिना-UPI वाला → IMPS; बड़ा और आराम से → NEFT; बहुत बड़ा → RTGS।</b></p>
<p>एक बात हमेशा याद रखिए: UPI PIN सिर्फ़ पैसा <b>भेजने</b> के लिए चाहिए। पैसा <i>पाने</i> के लिए PIN माँगने वाला हर आदमी ठग है।</p>`,
  fact:'भारत का UPI महीने में 13 अरब से ज़्यादा लेन-देन करता है - अमेरिका, ब्रिटेन और यूरोप के कुल डिजिटल भुगतान से भी ज़्यादा।'}},
{id:'scams',icon:'shield',col:'var(--coral)',soft:'var(--coral-soft)',mins:4,quiz:'digital',
 en:{title:'How to spot and escape digital scams',sum:'Scammers don’t hack phones - they hack feelings. Learn their 4 tricks.',
  body:`<p>Almost every digital scam uses one of four feelings: <b>fear</b> ("your account will be blocked!"), <b>greed</b> ("you won ₹25 lakh!"), <b>urgency</b> ("only 10 minutes left!") or <b>trust</b> ("I'm calling from your bank"). The moment a message makes your heart beat faster - pause. That feeling is the weapon.</p>
<p>The golden rules:</p>
<ul>
<li><b>OTP and PIN are like your toothbrush</b> - never shared with anyone, not even "bank officers". Real banks never ask.</li>
<li><b>You never need a PIN/OTP to receive money.</b> "Enter PIN to get your refund/prize" = 100% scam.</li>
<li><b>Don't tap links in SMS/WhatsApp</b> about KYC, lottery, electricity cut-offs. Open the official app or call the number on the back of your card instead.</li>
<li><b>Video-call "police officers" demanding money ("digital arrest") are fake.</b> Police never arrest people over video calls. Hang up.</li>
</ul>
<p>If money does get taken: act fast. Call <b>1930</b> (the national cyber-fraud helpline) immediately and report at cybercrime.gov.in - reporting within the first hour gives the best chance of freezing the money. There is no shame in being targeted; there is only power in reporting it.</p>`,
  fact:'Reporting fraud to 1930 within the first "golden hour" lets banks freeze the money mid-transfer - thousands of crores have been saved this way.'},
 hi:{title:'डिजिटल ठगी पहचानिए और बचिए',sum:'ठग फ़ोन नहीं हैक करते - भावनाएँ हैक करते हैं। उनकी 4 चालें जानिए।',
  body:`<p>लगभग हर डिजिटल ठगी चार भावनाओं में से एक का इस्तेमाल करती है: <b>डर</b> ("आपका खाता बंद हो जाएगा!"), <b>लालच</b> ("आपने ₹25 लाख जीते!"), <b>जल्दबाज़ी</b> ("सिर्फ़ 10 मिनट बचे!") या <b>भरोसा</b> ("मैं आपके बैंक से बोल रहा हूँ")। जिस पल कोई मैसेज दिल की धड़कन तेज़ कर दे - रुक जाइए। वही एहसास ठग का हथियार है।</p>
<p>सुनहरे नियम:</p>
<ul>
<li><b>OTP और PIN आपके टूथब्रश जैसे हैं</b> - किसी से साझा नहीं होते, "बैंक अधिकारी" से भी नहीं। असली बैंक कभी नहीं माँगते।</li>
<li><b>पैसा पाने के लिए कभी PIN/OTP नहीं लगता।</b> "रिफ़ंड/इनाम पाने के लिए PIN डालिए" = 100% ठगी।</li>
<li><b>SMS/WhatsApp के लिंक मत खोलिए</b> - KYC, लॉटरी, बिजली कटने वाले। उसकी जगह असली ऐप खोलिए या कार्ड के पीछे लिखे नंबर पर कॉल कीजिए।</li>
<li><b>वीडियो कॉल पर पैसा माँगने वाले "पुलिस वाले" ("डिजिटल अरेस्ट") नक़ली हैं।</b> पुलिस वीडियो कॉल पर गिरफ़्तारी नहीं करती। फ़ोन काट दीजिए।</li>
</ul>
<p>अगर पैसा चला ही जाए: फुर्ती कीजिए। तुरंत <b>1930</b> (राष्ट्रीय साइबर-फ़्रॉड हेल्पलाइन) पर कॉल कीजिए और cybercrime.gov.in पर शिकायत कीजिए - पहले घंटे में शिकायत करने पर पैसा रोकने की संभावना सबसे ज़्यादा होती है। ठगी का निशाना बनने में कोई शर्म नहीं; ताक़त शिकायत करने में है।</p>`,
  fact:'पहले "सुनहरे घंटे" में 1930 पर शिकायत करने से बैंक पैसा रास्ते में ही रोक सकते हैं - इसी तरीके से हज़ारों करोड़ बचाए जा चुके हैं।'}}
];

const METHODS=[
{id:'envelope',icon:'bag',col:'var(--yellow)',soft:'var(--yellow-soft)',mins:3,
 en:{title:'The Envelope Method - perfect for cash households',sum:'Old-school, powerful, and made for families paid in cash.',
  body:`<p>If your household runs on cash, this method is your best friend. On the day money comes in, divide it into <b>labelled envelopes</b>: Rent, Ration, School, Travel, Light Bill, Savings, and one small envelope for Joy (yes - fun is a category, not a sin).</p>
<p>The rule is simple and strict: <b>each expense comes only from its own envelope</b>. When the Ration envelope is empty, ration spending stops until next month - you don't borrow from the Rent envelope.</p>
<p>Why it works: cash in envelopes makes money <b>visible and finite</b>. A UPI balance is an abstract number; a thinning envelope is something the whole family can see and feel. Studies consistently show people spend 12–18% less when they spend physical cash.</p>
<p>Three tips: fill the <b>Savings envelope first</b> (even ₹200), not last. Keep envelopes somewhere safe but visible. And involve the kids - let them guard the School envelope. They learn budgeting before they learn algebra.</p>`,
  fact:'Fill the Savings envelope FIRST, not with what is "left over". There is never anything left over - that is the oldest budgeting truth in the world.'},
 hi:{title:'लिफ़ाफ़ा तरीका - नक़द कमाई वाले घरों के लिए',sum:'पुराना, दमदार, और कैश में चलने वाले परिवारों के लिए ही बना।',
  body:`<p>अगर आपका घर नक़द पर चलता है, तो यह तरीका आपका सबसे अच्छा दोस्त है। जिस दिन पैसा आए, उसे <b>नाम लिखे लिफ़ाफ़ों</b> में बाँट दीजिए: किराया, राशन, स्कूल, सफ़र, बिजली बिल, बचत - और एक छोटा लिफ़ाफ़ा ख़ुशी के लिए (हाँ - मज़ा भी एक श्रेणी है, गुनाह नहीं)।</p>
<p>नियम सीधा और सख़्त: <b>हर खर्च सिर्फ़ अपने लिफ़ाफ़े से</b>। राशन का लिफ़ाफ़ा ख़ाली, तो अगले महीने तक राशन का खर्च बंद - किराये के लिफ़ाफ़े से उधार नहीं।</p>
<p>यह काम क्यों करता है: लिफ़ाफ़े का पैसा <b>दिखता है और सीमित लगता है</b>। UPI का बैलेंस एक हवाई नंबर है; पतला होता लिफ़ाफ़ा पूरा परिवार देख और महसूस कर सकता है। शोध बताते हैं कि नक़द खर्च करने पर लोग 12–18% कम खर्च करते हैं।</p>
<p>तीन सुझाव: <b>सबसे पहले बचत का लिफ़ाफ़ा</b> भरिए (₹200 ही सही), सबसे आख़िर में नहीं। लिफ़ाफ़े सुरक्षित पर दिखने वाली जगह रखिए। और बच्चों को जोड़िए - स्कूल का लिफ़ाफ़ा उनके हवाले कीजिए। वे अलजेब्रा से पहले बजट सीख जाएँगे।</p>`,
  fact:'बचत का लिफ़ाफ़ा सबसे पहले भरिए, "जो बचेगा उससे" नहीं। कुछ कभी नहीं बचता - यह दुनिया का सबसे पुराना बजट-सच है।'}},
{id:'zerobased',icon:'bulb',col:'var(--blue)',soft:'var(--blue-soft)',mins:3,
 en:{title:'Zero-Based Budgeting - every rupee gets a job',sum:'For families who want full control: income minus plans equals zero.',
  body:`<p>Zero-based budgeting has one beautiful rule: <b>income − every planned rupee = 0</b>. Before the month begins, every single rupee is assigned a job - ₹6,000 to rent, ₹4,000 to food, ₹1,500 to savings, ₹300 to mobile recharge… until nothing is unassigned.</p>
<p>"Zero" doesn't mean you spend everything - savings is a job too, often the first one. It means <b>no rupee wanders around jobless</b>, because jobless rupees are the ones that disappear into small, forgettable spending.</p>
<p>How to start: take last month's actual spending (check your UPI history - it's a ready-made diary). Write every category and give next month's rupees their jobs. Mid-month, if one category overflows, you must consciously <b>move money from another job</b> - that conscious choice is the whole discipline.</p>
<p>It takes 30 minutes a month, one notebook page or one phone note. In exchange, the most common money feeling - "where did it all go?" - disappears completely. You'll know exactly where it went, because you sent it there.</p>`,
  fact:'UPI history is a free, automatic spending diary. Most families who check a full month of it find at least one ₹500+ surprise they had no idea about.'},
 hi:{title:'ज़ीरो-बेस्ड बजट - हर रुपये को एक काम',sum:'पूरा हिसाब चाहने वालों के लिए: कमाई घटा योजना बराबर शून्य।',
  body:`<p>ज़ीरो-बेस्ड बजट का एक सुंदर नियम है: <b>कमाई − हर योजना वाला रुपया = 0</b>। महीना शुरू होने से पहले हर एक रुपये को काम दे दीजिए - ₹6,000 किराये को, ₹4,000 राशन को, ₹1,500 बचत को, ₹300 रिचार्ज को… जब तक कोई रुपया बिना काम का न बचे।</p>
<p>"ज़ीरो" का मतलब सब खर्च कर देना नहीं - बचत भी एक काम है, अक्सर सबसे पहला। मतलब यह है कि <b>कोई रुपया बेरोज़गार न घूमे</b>, क्योंकि बेरोज़गार रुपये ही छोटे-छोटे भूल जाने वाले खर्चों में ग़ायब होते हैं।</p>
<p>शुरुआत ऐसे: पिछले महीने का असली खर्च देखिए (UPI हिस्ट्री तैयार डायरी है)। हर श्रेणी लिखिए और अगले महीने के रुपयों को काम बाँट दीजिए। महीने के बीच में कोई श्रेणी बढ़ जाए, तो जान-बूझकर <b>दूसरे काम से पैसा हटाकर</b> देना होगा - वही सोचा-समझा फ़ैसला असली अनुशासन है।</p>
<p>महीने में 30 मिनट, एक कॉपी का पन्ना या फ़ोन का एक नोट। बदले में पैसों की सबसे आम बेचैनी - "सब गया कहाँ?" - हमेशा के लिए ख़त्म। आपको ठीक-ठीक पता होगा कहाँ गया, क्योंकि आपने ही भेजा था।</p>`,
  fact:'UPI हिस्ट्री एक मुफ़्त, अपने आप बनने वाली खर्च-डायरी है। पूरा एक महीना जाँचने वाले ज़्यादातर परिवारों को कम-से-कम एक ₹500+ का अनजाना खर्च ज़रूर मिलता है।'}},
{id:'irregular',icon:'arrow',col:'var(--green)',soft:'var(--green-soft)',mins:4,
 en:{title:'Budgeting on irregular income',sum:'Daily wages, seasonal work, good months and bad - here’s the system.',
  body:`<p>Most budgeting advice assumes a fixed salary on the 1st. But what if you earn daily, or some months are double and some are half? You need a different system - one built on <b>your worst month, not your best</b>.</p>
<p><b>Step 1 - find your floor.</b> Look at your last 6 months and find the lowest month's income. That number is your "floor". Build your basic monthly budget (needs only) to fit inside the floor.</p>
<p><b>Step 2 - pay yourself a salary.</b> In good months, don't let the extra sit in your pocket. Move it into a separate "buffer" account, then pay yourself the same fixed amount every month from it. You become your own salary-giver.</p>
<p><b>Step 3 - the daily skim.</b> If you're paid daily, skim a fixed small slice <b>every single day</b> - even ₹20–₹50 - into a jar or the buffer account before anything else. On a ₹500 day and on a ₹900 day, the skim happens first.</p>
<p>Good months will tempt you to upgrade your life. Resist upgrading your <b>needs</b>; let good months upgrade your <b>buffer</b>. The buffer is what turns an irregular income into a calm, regular life.</p>`,
  fact:'A daily skim of just ₹30 becomes almost ₹11,000 in a year - an emergency fund built from money you barely notice missing.'},
 hi:{title:'घटती-बढ़ती कमाई में बजट कैसे बनाएँ',sum:'दिहाड़ी, सीज़न का काम, अच्छे-बुरे महीने - यह रहा पूरा सिस्टम।',
  body:`<p>बजट की ज़्यादातर सलाह मानकर चलती है कि 1 तारीख़ को बँधी तनख़्वाह आएगी। पर अगर कमाई रोज़ की है, या कोई महीना दुगना और कोई आधा? तब अलग सिस्टम चाहिए - जो <b>आपके सबसे कमज़ोर महीने पर टिका हो, सबसे अच्छे पर नहीं</b>।</p>
<p><b>स्टेप 1 - अपनी ज़मीन ढूँढिए।</b> पिछले 6 महीने देखिए और सबसे कम कमाई वाला महीना पकड़िए। वही आपकी "ज़मीन" है। घर का बुनियादी बजट (सिर्फ़ ज़रूरतें) इसी के अंदर बनाइए।</p>
<p><b>स्टेप 2 - ख़ुद को तनख़्वाह दीजिए।</b> अच्छे महीनों की बढ़त जेब में मत रहने दीजिए। उसे अलग "बफ़र" खाते में डालिए, और हर महीने उसी से ख़ुद को एक बँधी रकम दीजिए। अपनी तनख़्वाह देने वाले ख़ुद बनिए।</p>
<p><b>स्टेप 3 - रोज़ की कतरन।</b> कमाई रोज़ मिलती है तो <b>हर दिन</b> एक छोटा बँधा हिस्सा - ₹20–₹50 ही सही - सबसे पहले गुल्लक या बफ़र खाते में डालिए। ₹500 वाले दिन भी, ₹900 वाले दिन भी - कतरन पहले।</p>
<p>अच्छे महीने ज़िंदगी बड़ी करने का लालच देंगे। <b>ज़रूरतें</b> मत बढ़ाइए; अच्छे महीनों से <b>बफ़र</b> बढ़ाइए। वही बफ़र घटती-बढ़ती कमाई को सुकून भरी, बँधी ज़िंदगी में बदल देता है।</p>`,
  fact:'रोज़ सिर्फ़ ₹30 की कतरन साल में लगभग ₹11,000 बन जाती है - ऐसा इमरजेंसी फ़ंड जो उस पैसे से बना जिसकी कमी महसूस ही नहीं हुई।'}}
];
const STORIES=[
{id:'sita',icon:'star',col:'var(--coral)',soft:'var(--coral-soft)',
 en:{name:'Sita · Pune',title:'₹40,000 saved in 8 months - on a ₹18,000 income',
  body:`<p>Sita works as a cook in four houses in Pune and brings home about ₹18,000 a month. For years, the month ended with nothing left - sometimes less than nothing.</p>
<p>After a budgeting workshop, she tried the 50-30-20 split with one change: she made it <b>55-25-20</b>, because rent in Pune is brutal. On the 1st of every month, ₹3,600 went into a separate Jan Dhan account <b>before anything else</b> - her "don't touch" account.</p>
<p>The first two months were hard. She says the trick that saved her: a 24-hour wait rule on every want above ₹300. "Half the time, next morning I didn't want it anymore."</p>
<p>In 8 months she had ₹28,800 saved from the salary cuts, plus ₹11,000 from festival bonuses she banked instead of spending - <b>₹40,000 total</b>. When her son needed a hospital stay, she paid the deposit herself, no moneylender. "That day," she says, "the envelope felt like a wall around my family."</p>`},
 hi:{name:'सीता · पुणे',title:'₹18,000 की कमाई पर 8 महीने में ₹40,000 की बचत',
  body:`<p>सीता पुणे में चार घरों में खाना बनाती हैं और महीने में क़रीब ₹18,000 कमाती हैं। सालों तक महीना ख़त्म होते-होते कुछ नहीं बचता था - कभी-कभी तो उल्टा उधार चढ़ जाता था।</p>
<p>एक बजट वर्कशॉप के बाद उन्होंने 50-30-20 आज़माया, एक बदलाव के साथ: उन्होंने इसे <b>55-25-20</b> बनाया, क्योंकि पुणे का किराया बेरहम है। हर महीने की 1 तारीख़ को ₹3,600 <b>सबसे पहले</b> अलग जन धन खाते में जाते - उनका "हाथ नहीं लगाना" खाता।</p>
<p>पहले दो महीने मुश्किल थे। वे बताती हैं कि किस तरकीब ने बचाया: ₹300 से ऊपर की हर इच्छा पर 24 घंटे रुकने का नियम। "आधी बार तो अगली सुबह वह चीज़ चाहिए ही नहीं होती थी।"</p>
<p>8 महीनों में तनख़्वाह की कटौती से ₹28,800 जमा हुए, और त्योहार के बोनस के ₹11,000 जो खर्चने की जगह बैंक गए - <b>कुल ₹40,000</b>। जब बेटे को अस्पताल में भर्ती करना पड़ा, तो डिपॉज़िट उन्होंने ख़ुद भरा - कोई साहूकार नहीं। वे कहती हैं, "उस दिन लगा, यह बचत मेरे परिवार के चारों ओर एक दीवार है।"</p>`}},
{id:'ahmed',icon:'sprout',col:'var(--green)',soft:'var(--green-soft)',
 en:{name:'Ahmed · Nagpur',title:'An emergency fund built on daily wages',
  body:`<p>Ahmed does electrical work in Nagpur. Some days he earns ₹700, some days ₹250, some days nothing. "How can I budget when I don't know Tuesday's income?" he used to ask.</p>
<p>The envelope method, adapted for daily earners, changed it. Every evening - no matter what the day brought - the first ₹40 went into a locked tin. Not the last ₹40. The <b>first</b>. Then four envelopes: ration, room, transport, and one for tools.</p>
<p>On good days, anything above ₹600 was split - half to the tin, half to a "lean day" envelope that fed the family on no-work days, so bad days stopped becoming debt days.</p>
<p>In 14 months the tin and his new bank account held <b>over ₹15,000</b>. When the monsoon flooded his room and ruined his tools, he replaced them in two days and was back earning - no loan, no lost month. "The tin is small," he says, "but it made me the calmest man on bad days."</p>`},
 hi:{name:'अहमद · नागपुर',title:'दिहाड़ी की कमाई पर खड़ा हुआ इमरजेंसी फ़ंड',
  body:`<p>अहमद नागपुर में बिजली का काम करते हैं। किसी दिन ₹700, किसी दिन ₹250, किसी दिन कुछ नहीं। पहले पूछते थे - "जब मंगलवार की कमाई का ही पता नहीं, तो बजट कैसे बनाऊँ?"</p>
<p>दिहाड़ी वालों के लिए ढाला गया लिफ़ाफ़ा तरीका सब बदल गया। हर शाम - दिन कैसा भी रहा हो - पहले ₹40 एक बंद डिब्बे में जाते। आख़िरी ₹40 नहीं। <b>पहले</b> ₹40। फिर चार लिफ़ाफ़े: राशन, कमरा, सफ़र, और एक औज़ारों के लिए।</p>
<p>अच्छे दिनों में ₹600 से ऊपर की कमाई आधी-आधी बँटती - आधी डिब्बे में, आधी "मंदे दिन" वाले लिफ़ाफ़े में, जो बिना काम वाले दिनों में घर चलाता। इस तरह बुरे दिन क़र्ज़ के दिन बनने बंद हो गए।</p>
<p>14 महीनों में डिब्बे और नए बैंक खाते में <b>₹15,000 से ज़्यादा</b> जमा थे। बरसात में कमरे में पानी भरा और औज़ार ख़राब हो गए, तो दो दिन में नए औज़ार लेकर वे फिर काम पर थे - न क़र्ज़, न महीना बर्बाद। कहते हैं, "डिब्बा छोटा है, पर बुरे दिनों में सबसे शांत आदमी मैं ही होता हूँ।"</p>`}}
];

/* ───────── render: header / nav / routing ───────── */
const PAGES=['home','schemes','learn','budget','quiz'];
const NAVIC={home:DD.star('var(--yellow)'),schemes:DD.bag(),learn:DD.book(),budget:DD.jar(),quiz:DD.bulb()};
let curPage='home';
function avatarSVG(i){return AVATARS[(i||0)%AVATARS.length].svg;}
function renderHeader(){
  $('#logoCoin').innerHTML=DD.coin();
  $('#userChip').innerHTML=avatarSVG(S.avatar)+'<span>'+(S.name||'…')+'</span>';
  $('#langEn').classList.toggle('on',S.lang==='en');
  $('#langHi').classList.toggle('on',S.lang==='hi');
}
function renderNav(){
  $('#bnav').innerHTML=PAGES.map(p=>`<button data-p="${p}" class="${p===curPage?'on':''}">${NAVIC[p]}<span>${L('nav'+p[0].toUpperCase()+p.slice(1))}</span></button>`).join('');
  $$('#bnav button').forEach(b=>b.addEventListener('click',()=>go(b.dataset.p)));
}
function go(p){
  curPage=p;
  $$('.page').forEach(el=>el.classList.remove('on'));
  $('#page-'+p).classList.add('on');
  renderNav();renderPage(p);
  scrollTo({top:0});
}
function renderPage(p){
  if(p==='home')renderHome();
  else if(p==='schemes')renderSchemes();
  else if(p==='learn')renderLearn();
  else if(p==='budget')renderBudget();
  else if(p==='quiz')renderQuiz();
}
function renderAll(){renderHeader();renderNav();renderPage(curPage);}

function featuredQuiz(){return QUIZZES[FORTNIGHT%QUIZZES.length];}
function featuredScheme(){return SCHEMES[FORTNIGHT%SCHEMES.length];}

  return list.sort((a,b)=>b.pts-a.pts);
}

    ${METHODS.map(m=>`<button class="card tap sch-card" data-m="${m.id}">
      <span class="sch-ic" style="background:${m.soft}">${DD[m.icon](m.col)}</span>
      <span style="flex:1"><span class="sch-t">${P({en:m.en.title,hi:m.hi.title})}</span>
      <span class="sch-d">${P({en:m.en.sum,hi:m.hi.sum})}</span></span></button>`).join('')}
   </div>
   <div class="sec-h">${DD.heart()}${L('stories')}</div>
   <div class="grid g2">
    ${STORIES.map(st=>`<button class="card tap" data-st="${st.id}" style="background:${st.soft}">
      <span class="badge soft">✦ ${P({en:st.en.name,hi:st.hi.name})}</span>
      <div class="sch-t" style="margin-top:8px">${P({en:st.en.title,hi:st.hi.title})}</div></button>`).join('')}
   </div>`;
  const upd=()=>{
    calc.income=+$('#cIncome').value||0;
    calc.n=+$('#rN').value;calc.w=+$('#rW').value;calc.s=+$('#rS').value;
    $('#pN').textContent=calc.n+'%';$('#pW').textContent=calc.w+'%';$('#pS').textContent=calc.s+'%';
    const sum=calc.n+calc.w+calc.s,warn=$('#cWarn');
    if(sum!==100){warn.style.display='block';warn.textContent=L('splitWarn').replace('{x}',sum);}else warn.style.display='none';
    $('#oN').textContent=inr(calc.income*calc.n/100)+L('perMonth');
    $('#oW').textContent=inr(calc.income*calc.w/100)+L('perMonth');
    $('#oS').textContent=inr(calc.income*calc.s/100)+L('perMonth');
  };
  const updEF=()=>{
    calc.exp=+$('#eExp').value||0;calc.saved=+$('#eSaved').value||0;
    const m=calc.exp>0?calc.saved/calc.exp:0;
    $('#efBar').style.width=Math.min(100,m/6*100)+'%';
    $('#efBar').style.background=m>=3?'var(--green)':m>=1?'var(--yellow)':'var(--coral)';
    $('#efMonths').textContent=(Math.round(m*10)/10)+' '+L('efMonths');
    $('#efVerdict').textContent=m>=6?L('ef6'):m>=3?L('ef3'):m>=1?L('ef1'):L('ef0');
  };
  ['cIncome','rN','rW','rS'].forEach(id=>$('#'+id).addEventListener('input',upd));
  ['eExp','eSaved'].forEach(id=>$('#'+id).addEventListener('input',updEF));
  $('#cReset').addEventListener('click',()=>{$('#rN').value=50;$('#rW').value=30;$('#rS').value=20;upd();});
  $$('#page-budget [data-m]').forEach(b=>b.addEventListener('click',()=>openMethod(b.dataset.m)));
  $$('#page-budget [data-st]').forEach(b=>b.addEventListener('click',()=>openStory(b.dataset.st)));
  upd();updEF();
}

/* ───────── QUIZ LIST + ENGINE ───────── */
function renderQuiz(){
  const fq=featuredQuiz();
  $('#page-quiz').innerHTML=`
   <div class="page-title">${DD.bulb()}${L('quizTitle')}</div>
   <p class="page-sub">${L('quizSub')}</p>
   <div class="grid g2">
    ${QUIZZES.map(q=>{
      const st=S.quizzes[q.id];const D=P({en:q.en,hi:q.hi});
      return `<button class="card tap sch-card" data-q="${q.id}">
        <span class="sch-ic" style="background:${q.soft}">${DD[q.icon](q.col)}</span>
        <span style="flex:1"><span class="sch-t">${D.title}</span>
        <span class="sch-d">${D.desc}</span>
        <span class="sch-meta">
          ${q.id===fq.id?'<span class="badge new">✦ '+L('new')+'</span>':''}
          ${st&&st.done?`<span class="badge green">✓ ${L('done')} · ${L('best')} ${st.best}%</span>`:`<span class="badge yellow">${L('start')} →</span>`}
        </span></span></button>`;}).join('')}
   </div>
   <p class="foot-note">${L('locked')}</p>`;
  $$('#page-quiz [data-q]').forEach(b=>b.addEventListener('click',()=>openQuiz(b.dataset.q)));
}
let QZ=null;
function openQuiz(id){
  const q=QUIZZES.find(x=>x.id===id);
  const replay=!!(S.quizzes[id]&&S.quizzes[id].done);
  QZ={q,stage:'mcq',i:0,earned:0,max:q.mcq.length*10+q.flash.length*5+q.tot.length*5,correct:0,total:0,replay};
  openOvl(P({en:q.en,hi:q.hi}).title,'');
  qRender();
}
function qPips(){
  const total=QZ.q.mcq.length+QZ.q.flash.length+QZ.q.tot.length;
  const idx=QZ.stage==='mcq'?QZ.i:QZ.stage==='flash'?QZ.q.mcq.length+QZ.i:QZ.q.mcq.length+QZ.q.flash.length+QZ.i;
  return `<div class="q-progress">${Array.from({length:total},(_,k)=>`<div class="q-pip ${k<idx?'done':k===idx?'now':''}"></div>`).join('')}</div>`;
}
function qRender(){
  const q=QZ.q,body=$('#ovlBody');
  if(QZ.stage==='mcq'){
    if(QZ.i>=q.mcq.length){QZ.stage='flash';QZ.i=0;return qRender();}
    const m=q.mcq[QZ.i],D=P({en:m.en,hi:m.hi});
    body.innerHTML=`${qPips()}
      <div class="badge soft" style="margin-bottom:10px">${L('qOf').replace('{a}',QZ.i+1).replace('{b}',q.mcq.length)}</div>
      <h2 style="font-size:1.25rem">${D.q}</h2><div style="height:14px"></div>
      ${D.o.map((o,i)=>`<button class="q-opt" data-i="${i}">${o}</button>`).join('')}
      <div class="q-fb" id="qfb"></div>
      <button class="btn g" id="qNext" style="display:none">${L('next')}</button>`;
    let done=false;
    $$('#ovlBody .q-opt').forEach(b=>b.addEventListener('click',()=>{
      if(done)return;done=true;QZ.total++;
      const i=+b.dataset.i,ok=i===m.a;
      $$('#ovlBody .q-opt').forEach((x,xi)=>{x.disabled=true;if(xi===m.a)x.classList.add('right');else if(xi===i)x.classList.add('wrongpick');});
      const fb=$('#qfb');
      if(ok){QZ.correct++;if(!QZ.replay)QZ.earned+=10;fb.className='q-fb ok';fb.innerHTML='✓ '+L('correct')+(QZ.replay?'':' <b>+10</b>');}
      else{fb.className='q-fb no';fb.innerHTML='✗ '+L('oops')+' <b>'+D.o[m.a]+'</b>';b.classList.add('shake');}
      $('#qNext').style.display='inline-flex';
    }));
    $('#qNext').addEventListener('click',()=>{QZ.i++;qRender();});
  }
  else if(QZ.stage==='flash'){
    if(QZ.i>=q.flash.length){QZ.stage='tot';QZ.i=0;return qRender();}
    const f=q.flash[QZ.i],D=P({en:f.en,hi:f.hi});
    body.innerHTML=`${qPips()}
      <div class="badge soft" style="margin-bottom:10px">${L('flashOf').replace('{a}',QZ.i+1).replace('{b}',q.flash.length)}</div>
      <div class="flip-card" id="fc"><div class="flip-in">
        <div class="flip-f"><span class="fq">${D.f}</span><span class="flip-hint">${L('tapFlip')} ↻</span></div>
        <div class="flip-b"><p style="margin:0;font-weight:600">${D.b}</p></div>
      </div></div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn g sm" id="fKnew" disabled>${L('knew')}${QZ.replay?'':' +5'}</button>
        <button class="btn w sm" id="fLearn" disabled>${L('learning')}</button>
      </div>`;
    $('#fc').addEventListener('click',()=>{$('#fc').classList.add('flipped');$('#fKnew').disabled=false;$('#fLearn').disabled=false;});
    $('#fKnew').addEventListener('click',()=>{if(!QZ.replay)QZ.earned+=5;QZ.i++;qRender();});
    $('#fLearn').addEventListener('click',()=>{QZ.i++;qRender();});
  }
  else if(QZ.stage==='tot'){
    if(QZ.i>=q.tot.length)return qScore();
    const t=q.tot[QZ.i],D=P({en:t.en,hi:t.hi});
    body.innerHTML=`${qPips()}
      <div class="badge soft" style="margin-bottom:10px">⚡ ${L('totOf').replace('{a}',QZ.i+1).replace('{b}',q.tot.length)}</div>
      <h2 style="font-size:1.3rem;text-align:center;margin-top:14px">${D.q}</h2>
      <div class="tot-row"><button class="q-opt" data-t="a">${D.a}</button><button class="q-opt" data-t="b">${D.b}</button></div>
      <div class="q-fb" id="qfb" style="margin-top:14px"></div>`;
    let done=false;
    $$('#ovlBody [data-t]').forEach(b=>b.addEventListener('click',()=>{
      if(done)return;done=true;QZ.total++;
      const ok=b.dataset.t===t.c;
      $$('#ovlBody [data-t]').forEach(x=>{x.disabled=true;if(x.dataset.t===t.c)x.classList.add('right');else if(x===b)x.classList.add('wrongpick');});
      const fb=$('#qfb');
      if(ok){QZ.correct++;if(!QZ.replay)QZ.earned+=5;fb.className='q-fb ok';fb.innerHTML='✓ '+L('correct')+(QZ.replay?'':' <b>+5</b>');}
      else{fb.className='q-fb no';fb.innerHTML='✗ '+L('oops');}
      setTimeout(()=>{QZ.i++;qRender();},900);
    }));
  }
}
function qScore(){
  const q=QZ.q,D=P({en:q.en,hi:q.hi});
  const answerable=q.mcq.length+q.tot.length;
  const pct=Math.round(QZ.correct/answerable*100);
  if(!QZ.replay){
    S.points+=QZ.earned;
    S.quizzes[q.id]={done:true,best:pct};
    save();
  }else if(pct>(S.quizzes[q.id].best||0)){S.quizzes[q.id].best=pct;save();}
  const rank=lbList().findIndex(e=>e.me)+1;
  if(pct>=70)confetti();
  $('#ovlBody').innerHTML=`
    <div style="text-align:center;padding-top:10px">
      <div class="score-big">${pct}%</div>
      <div class="badge yellow" style="margin:10px 0">${QZ.replay?L('replayNote'):'+'+QZ.earned+' '+L('earned')}</div>
      <h2 style="margin:8px 0 4px">${L('scorecard')}</h2>
      <p style="color:var(--ink-soft);font-size:0.9rem">${L('rank')}: <b style="color:var(--green)">#${rank}</b> · ${L('totalPts')}: <b>${S.points}</b></p>
      <div class="fact-box" style="text-align:left">${DD.bulb()} ${pct>=60?D.insightHi:D.insightLo}</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:10px">
        <button class="btn g" id="qAgain">${L('replay')}</button>
        <button class="btn w" id="qHome">${L('back')}</button>
      </div>
    </div>`;
  renderHeader();
  $('#qAgain').addEventListener('click',()=>openQuiz(q.id));
  $('#qHome').addEventListener('click',()=>{closeOvl();renderPage(curPage);});
}
function confetti(){
  const cols=['#1d9e75','#f6b93b','#e85d4a','#3b6fb6','#2c2218'];
  for(let i=0;i<40;i++){const c=document.createElement('span');c.className='cf';
    c.style.left=Math.random()*100+'vw';c.style.background=cols[i%cols.length];
    c.style.animationDelay=(Math.random()*0.6)+'s';c.style.animationDuration=(2+Math.random()*1.3)+'s';
    $('#cfx').appendChild(c);setTimeout(()=>c.remove(),4000);}
}

/* ───────── onboarding + profile ───────── */
function openModal(html){$('#modalBox').innerHTML=html;$('#modalBg').classList.add('on');}
function closeModal(){$('#modalBg').classList.remove('on');}
function onboard(step){
  if(step===1){
    openModal(`<h2>${T.en.onbWelcome} 🪙</h2><p class="ms">${T.en.onbSub}</p>
      <b class="head" style="display:block;margin-bottom:10px">${T.en.onbLang} / ${T.hi.onbLang}</b>
      <div class="lang-big"><button data-l="en">English</button><button data-l="hi">हिन्दी</button></div>`);
    $$('#modalBox [data-l]').forEach(b=>b.addEventListener('click',()=>{S.lang=b.dataset.l;save();onboard(2);}));
  }else{
    openModal(`<h2>${L('onbName')}</h2>
      <input class="name-in" id="obName" maxlength="16" placeholder="${L('onbNamePh')}">
      <b class="head" style="display:block;margin-bottom:10px">${L('onbAvatar')}</b>
      <div class="av-grid">${AVATARS.map((a,i)=>`<button class="av-cell ${i===0?'on':''}" data-av="${i}">${a.svg}<span>${P(a.n)}</span></button>`).join('')}</div>
      <button class="btn g" id="obGo" style="width:100%">${L('startBtn')}</button>`);
    let av=0;
    $$('#modalBox [data-av]').forEach(b=>b.addEventListener('click',()=>{av=+b.dataset.av;$$('#modalBox .av-cell').forEach(x=>x.classList.remove('on'));b.classList.add('on');}));
    $('#obGo').addEventListener('click',()=>{
      const n=$('#obName').value.trim();
      if(!n){$('#obName').classList.add('shake');setTimeout(()=>$('#obName').classList.remove('shake'),450);$('#obName').focus();return;}
      S.name=n;S.avatar=av;save();closeModal();renderAll();confetti();
    });
    setTimeout(()=>$('#obName').focus(),150);
  }
}
function openProfile(){
  const done=Object.values(S.quizzes).filter(x=>x.done).length;
  openModal(`<h2>${L('profile')}</h2>
    <p class="ms">${L('totalPts')}: <b style="color:var(--green)">${S.points}</b> · ${L('quizzesDone')}: <b>${done}/${QUIZZES.length}</b> · 🔥 ${streakCount()} ${L('streakDays')}</p>
    <input class="name-in" id="pfName" maxlength="16" value="${S.name}">
    <div class="av-grid">${AVATARS.map((a,i)=>`<button class="av-cell ${i===S.avatar?'on':''}" data-av="${i}">${a.svg}<span>${P(a.n)}</span></button>`).join('')}</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn g" id="pfSave">${L('saveBtn')}</button>
      <button class="btn w" id="pfClose">${L('close')}</button>
      <button class="btn c sm" id="pfReset" style="margin-left:auto">${L('resetAll')}</button>
    </div>`);
  let av=S.avatar;
  $$('#modalBox [data-av]').forEach(b=>b.addEventListener('click',()=>{av=+b.dataset.av;$$('#modalBox .av-cell').forEach(x=>x.classList.remove('on'));b.classList.add('on');}));
  $('#pfSave').addEventListener('click',()=>{const n=$('#pfName').value.trim();if(n)S.name=n;S.avatar=av;save();closeModal();renderAll();});
  $('#pfClose').addEventListener('click',closeModal);
  $('#pfReset').addEventListener('click',()=>{if(confirm(L('resetConfirm'))){localStorage.removeItem(LSKEY);location.reload();}});
}
$('#modalBg').addEventListener('click',e=>{if(e.target===$('#modalBg')&&S.name)closeModal();});

/* ───────── init ───────── */
load();
$('#langEn').addEventListener('click',()=>{S.lang='en';save();renderAll();});
$('#langHi').addEventListener('click',()=>{S.lang='hi';save();renderAll();});
$('#userChip').addEventListener('click',()=>{if(S.name)openProfile();});
$('#logoHome').addEventListener('click',()=>go('home'));
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if($('#ovl').classList.contains('on'))closeOvl();else if($('#modalBg').classList.contains('on')&&S.name)closeModal();}});
renderAll();
if(!S.name)onboard(1);
</script>
